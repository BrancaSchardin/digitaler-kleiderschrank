<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digitaler Kleiderschrank — Personal Wardrobe Organizer</title>
  <meta name="description" content="Digitaler Kleiderschrank is a personal wardrobe organizer that helps you catalog what you own and discover similar pieces to shop." />
  <style>
    :root {
      --bg: #f7f5f2;
      --card: #ffffff;
      --ink: #1f1d1b;
      --muted: #6b6560;
      --accent: #b5794b;
      --line: #e7e2db;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      line-height: 1.6;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      max-width: 560px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    .logo {
      width: 56px; height: 56px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 28px;
    }
    h1 { font-size: 28px; letter-spacing: -0.02em; margin-bottom: 6px; }
    .tag { color: var(--accent); font-weight: 600; font-size: 14px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 24px; }
    p { color: var(--muted); font-size: 16px; margin-bottom: 16px; }
    .soon {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 14px;
      color: var(--muted);
    }
    .foot { margin-top: 28px; font-size: 13px; color: var(--muted); }
    .foot a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">👗</div>
    <h1>Digitaler Kleiderschrank</h1>
    <div class="tag">Personal Wardrobe Organizer</div>
    <p>
      Catalog the clothing and accessories you already own — all in one place.
    </p>
    <p>
      For any item in your wardrobe, discover similar and complementary pieces
      available to shop, with links straight to the original listings.
    </p>
    <span class="soon">Coming soon</span>
  </main>
</body>
</html>
